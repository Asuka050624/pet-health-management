services:
  backend:
    build: ./backend
    container_name: pet-health-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - backend-db:/app/db
      - backend-uploads:/app/uploads
    environment:
      - FLASK_ENV=development
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/db/pet_health.db
    networks:
      - pet-health-network

  frontend:
    build: ./frontend
    container_name: pet-health-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pet-health-network

volumes:
  backend-db:
  backend-uploads:

networks:
  pet-health-network:
    driver: bridge
